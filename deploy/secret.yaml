# Porkbun API credentials.
#
# This is a TEMPLATE — do not commit real credentials here.
# In a real cluster, manage this secret with Sealed Secrets, SOPS, or the
# External Secrets Operator instead of committing it.
#
# To encode values manually: echo -n 'your-value' | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: porkbun-webhook-credentials
  namespace: external-dns
type: Opaque
stringData:
  # Generate at https://porkbun.com/account/api
  # Both keys are required — the webhook will refuse to start without them.
  PORKBUN_API_KEY: "REPLACE_WITH_YOUR_PORKBUN_API_KEY"
  PORKBUN_API_SECRET: "REPLACE_WITH_YOUR_PORKBUN_API_SECRET"
