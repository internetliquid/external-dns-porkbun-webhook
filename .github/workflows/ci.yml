name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  check:
    name: Lint, vet & test
    runs-on: ubuntu-latest
    env:
      # Surfaced to env so the integration step's `if` can gate on them: the
      # `secrets` context is not available in `if:` conditions.
      PORKBUN_API_KEY: ${{ secrets.PORKBUN_API_KEY }}
      PORKBUN_API_SECRET: ${{ secrets.PORKBUN_API_SECRET }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out="$(gofmt -s -l .)"
          if [ -n "$out" ]; then
            echo "These files are not gofmt-clean:"; echo "$out"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      # Integration tests require live Porkbun credentials.
      # They run only when both secrets are available (not on forks).
      - name: Integration tests
        if: ${{ env.PORKBUN_API_KEY != '' && env.PORKBUN_API_SECRET != '' }}
        run: go test -race -tags=integration ./...

  image:
    name: Docker build (validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Keep the local-use Dockerfile building; the release image is built by
      # GoReleaser/ko, so this validates only (no push).
      - name: Build image
        run: docker build --build-arg VERSION=ci -t external-dns-porkbun-webhook:ci .
