name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  check:
    name: Lint, vet & test
    runs-on: ubuntu-latest
    env:
      # Surfaced to env so the integration step's `if` can gate on them: the
      # `secrets` context is not available in `if:` conditions.
      PORKBUN_API_KEY: ${{ secrets.PORKBUN_API_KEY }}
      PORKBUN_API_SECRET: ${{ secrets.PORKBUN_API_SECRET }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out="$(gofmt -s -l .)"
          if [ -n "$out" ]; then
            echo "These files are not gofmt-clean:"; echo "$out"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      # Integration tests require live Porkbun credentials.
      # They run only when both secrets are available (not on forks).
      - name: Integration tests
        if: ${{ env.PORKBUN_API_KEY != '' && env.PORKBUN_API_SECRET != '' }}
        run: go test -race -tags=integration ./...

  image:
    name: Docker build (validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Keep the local-use Dockerfile building; the release image is built by
      # GoReleaser/ko, so this validates only (no push).
      - name: Build image
        run: docker build --build-arg VERSION=ci -t external-dns-porkbun-webhook:ci .

  # Pre-merge review by Claude. Gated on `check` so no tokens are spent on code
  # that doesn't already build, lint, vet, and pass tests under -race. Skipped
  # for non-PR events, for bot-authored PRs (e.g. release-please's release PRs),
  # and for PRs whose title carries [skip-review] or [WIP].
  review:
    name: Claude code review
    needs: check
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !contains(github.event.pull_request.title, '[WIP]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: "claude-opus-4-8"
          use_sticky_comment: true
          allowed_tools: ""
          direct_prompt: |
            ROLE: Senior Go engineer, pre-merge review of an ExternalDNS webhook provider for Porkbun DNS. Stack: Go 1.26; std-lib net/http via the external-dns `provider/webhook/api.StartHTTPApi` helper; a typed wrapper over the maintained `nrdcg/porkbun` client (internal rate limiter + per-zone TTL record cache); slog; Prometheus; distroless/nonroot image; release-please + GoReleaser/ko. Branch model develop+main. Greenfield — no backward-compat tolerated.

            STANCE:
            - Be skeptical but realistic. Most code is fine. Silence is approval.
            - No praise, no "looks good," no thank-you, no closing remarks.
            - Cite `path:LINE` for every finding. No vague advice.
            - Severity (anchor honestly — most real findings are MINOR):
              - BLOCKER — concrete bug, security gap, or invariant violation that should not merge. Rare.
              - MAJOR — concrete bug or choice that will cause real problems soon. Uncommon.
              - MINOR — real issue with bounded blast radius. Default tag for real findings.
              - NIT — preference the compiler doesn't catch. Use sparingly.
            - Skip categories with no real finding. Do not invent issues to fill slots.
            - gofmt/go vet/golangci-lint/govulncheck already ran and passed — don't spend budget on style or on vulns they'd catch.

            CHECK:
            1. Invariants — the API key and secret are secrets: never logged, and scrubbed from transport errors (defensive, since `nrdcg` sends credentials in the POST body, not the URL); every outbound call carries a context with the bounded timeout; the rate limiter is never bypassed; DOMAIN_FILTER stays required (zones are not auto-discovered — `nrdcg` exposes no list-domains); the webhook contract methods stay conformant (Records / ApplyChanges / AdjustEndpoints / GetDomainFilter); record ids are resolved at apply time by re-listing and matching (type, name, content[, MX prio]), never cached in endpoint.ProviderSpecific. TTL: Porkbun's 600s minimum is **deliberately not clamped** — a sub-600 TTL is sent as-is so Porkbun's rejection surfaces the misconfiguration; flag any silent clamping, not the absence of it.
            2. Go correctness in this diff — errors wrapped with %w and never swallowed; no data races (shared maps/fields touched across goroutines — metrics server, cache, limiter); context cancellation/timeouts honoured; response reads bounded; slices preallocated when the length is known; no goroutine leaks; output never depends on map-iteration order.
            3. Provider mapping in this diff — endpoint↔record mapping correct for A/AAAA/CNAME/MX/TXT (MX `<pref> <exchange>` ↔ Prio+Content; TXT content is stored/returned UNQUOTED — pass as-is, do NOT strip quotes); longest-suffix zone resolution; apex host is `""` (omitempty) on write and the FQDN stripped to its relative label on read; create/update/delete translation avoids reconcile churn.
            4. Porkbun client in this diff — success is `status == "SUCCESS"`; a non-200 surfaces as `*porkbun.ServerError` and BOTH 429 and 503 are treated as retryable; the `nrdcg` constructor is positional and secret-first (`New(secretAPIKey, apiKey)`); record ID string↔int coercion is bridged at the wrapper boundary (`strconv`); the cache is invalidated on every mutation.
            5. Tests — table tests with httptest (via the `nrdcg` `BaseURL` seam) and the mock client cover the changed branches; race-sensitive code is exercised under -race.

            OUTPUT:

            **Verdict:** BLOCK / RISKY / OK

            **Findings:** (omit heading if none)
            - `[SEVERITY] path:LINE` — problem · why · fix.

            No strengths section, TL;DR, thank-you, or closing.
