name: Release

# Runs on every push to develop. release-please maintains a "Release PR"
# (version + changelog from Conventional Commits); merging that PR creates the
# tag + GitHub Release. The remaining steps run in the SAME job only when a
# release was just created — this avoids the gotcha where a tag created with
# GITHUB_TOKEN does not trigger a separate, tag-triggered workflow.
on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Release please
        id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- Everything below runs only on an actual release ---

      - name: Checkout release commit
        if: ${{ steps.rp.outputs.release_created }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        if: ${{ steps.rp.outputs.release_created }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        if: ${{ steps.rp.outputs.release_created }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        if: ${{ steps.rp.outputs.release_created }}
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Promote: fast-forward main to the released commit so main always tracks
      # the latest release. Requires main's branch protection to allow this push
      # (or a PAT); see the README.
      - name: Fast-forward main to the release
        if: ${{ steps.rp.outputs.release_created }}
        env:
          RELEASE_SHA: ${{ steps.rp.outputs.sha }}
        run: git push origin "${RELEASE_SHA}:refs/heads/main"
