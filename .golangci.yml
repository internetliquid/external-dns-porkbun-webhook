version: "2"

run:
  timeout: 5m

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - bodyclose
    - copyloopvar
    - errorlint
    - misspell
    - unconvert
    - whitespace
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      # Tests may ignore errors and use non-context HTTP helpers freely.
      - linters:
          - errcheck
          - noctx
        path: _test\.go

formatters:
  enable:
    - gofmt
    - goimports
